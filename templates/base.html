<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% block title %}
        E-Learning System
      {% endblock %}
    </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style type="text/tailwindcss">
      @layer utilities {
        body {
          font-family: 'Inter', sans-serif;
        }
        input[type='text'],
        input[type='password'],
        input[type='email'] {
          @apply w-full px-4 py-3 mt-1 text-black bg-white/50 border border-white/40 rounded-xl outline-none shadow-inner backdrop-blur-sm transition-all duration-300 focus:bg-white/80 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/50;
        }
      }
    </style>
  </head>
  <body class="bg-gradient-to-br from-white to-pink-100 min-h-screen flex flex-col items-center text-black antialiased">
    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-blue-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-96 h-96 bg-pink-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>

    <nav class="w-full fixed top-0 z-50 bg-white/40 backdrop-blur-xl border-b border-white/60 shadow-sm">
      <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="/" class="text-xl font-bold text-blue-600 tracking-tight hover:text-blue-800 transition">E-Learning</a>
        <div class="flex items-center space-x-4">
          {% if user.is_authenticated %}
            <span class="text-sm font-medium text-gray-700">Halo, <span class="font-bold text-black">{{ user.username }}</span> ({{ user.get_role_display }})</span>
            <a href="{% url 'accounts:logout' %}" class="text-sm font-bold text-red-500 hover:text-red-700 transition">Logout</a>
          {% else %}
            <a href="{% url 'accounts:login' %}" class="text-sm font-bold text-black hover:text-blue-600 transition">Login</a>
            <a href="{% url 'accounts:register' %}" class="text-sm font-bold px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition shadow-md hover:scale-105">Daftar</a>
          {% endif %}
        </div>
      </div>
    </nav>

    <main class="w-full max-w-5xl p-6 mt-24 relative z-10">
      {% block content %}

      {% endblock %}
    </main>
  </body>
</html>
