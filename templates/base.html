<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% block title %}
        E-Learning System
      {% endblock %}
    </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style type="text/tailwindcss">
      @layer utilities {
        body {
          font-family: 'Inter', sans-serif;
        }
        /* Styling otomatis untuk input bawaan Django agar menyatu dengan tema Glassmorphism */
        input[type='text'],
        input[type='password'],
        input[type='email'] {
          @apply w-full px-4 py-3 mt-1 text-black bg-white/50 border border-white/40 rounded-xl outline-none shadow-inner backdrop-blur-sm transition-all duration-300 focus:bg-white/80 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/50;
        }
      }
    </style>
  </head>
  <body class="bg-gradient-to-br from-white to-pink-100 min-h-screen flex items-center justify-center text-black antialiased">
    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-blue-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-96 h-96 bg-pink-300 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>

    <main class="w-full max-w-md p-6 relative z-10">
      {% block content %}

      {% endblock %}
    </main>
  </body>
</html>
