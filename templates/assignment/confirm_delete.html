{% extends 'base.html' %}

{% block title %}
  Hapus Tugas - E-Learning
{% endblock %}

{% block content %}
  <div class="bg-white/80 border border-white/60 shadow-xl rounded-3xl p-10 max-w-xl mx-auto">
    <h1 class="text-3xl font-bold text-black mb-4">Hapus Tugas</h1>
    <p class="text-gray-700 mb-6">Apakah Anda yakin ingin menghapus tugas <span class="font-semibold text-blue-700">{{ object.title }}</span>?</p>
    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div class="flex gap-3">
        <button type="submit" class="flex-1 text-white bg-red-600 hover:bg-red-700 rounded-xl py-3 font-semibold">Ya, hapus</button>
        <a href="{% url 'forum:landing' %}" class="flex-1 text-center text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-xl py-3 font-semibold">Batal</a>
      </div>
    </form>
  </div>
{% endblock %}
