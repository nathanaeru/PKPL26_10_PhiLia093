{% extends "base.html" %}
{% block title %}Daftar Tugas{% endblock %}

{% block content %}

<div class="max-w-4xl mx-auto">

  <!-- HEADER -->
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-blue-600">
      📚 Daftar Tugas
    </h1>
    <p class="text-sm text-gray-600">
      Pilih tugas untuk melihat submission mahasiswa
    </p>
  </div>

  <!-- LIST -->
  <div class="space-y-4">

    {% for tugas in assignments %}
      <div class="bg-white/80 backdrop-blur-xl border border-white/50 shadow-lg rounded-2xl p-5 flex items-center justify-between hover:shadow-xl transition">

        <div>
          <h3 class="text-lg font-semibold text-gray-800">
            {{ tugas.title }}
          </h3>
        </div>

        <a href="{% url 'assignment:daftar_submission' tugas.id %}">
          <button class="bg-blue-600 text-white px-4 py-2 rounded-xl font-medium hover:bg-blue-700 transition hover:scale-105">
            Lihat Submission
          </button>
        </a>

      </div>
    {% empty %}
      <div class="bg-white/70 border border-white/40 rounded-2xl p-6 text-gray-600">
        Belum ada tugas.
      </div>
    {% endfor %}

  </div>

</div>

{% endblock %}
